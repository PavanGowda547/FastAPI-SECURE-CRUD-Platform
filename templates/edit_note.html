{% extends "base.html" %}

{% block nav_links %}
    <a href="/dashboard">← Back to Dashboard</a>
{% endblock %}

{% block content %}
<div class="container-sm">
    <div class="card">
        <h2>Edit Note</h2>

        <form method="post" action="/notes/{{ note.id }}/update">
            <div class="form-group">
                <label for="title">Title</label>
                <input id="title" name="title" type="text" value="{{ note.title }}" required maxlength="100">
            </div>
            <div class="form-group">
                <label for="content">Content</label>
                <textarea id="content" name="content" required maxlength="5000">{{ note.content }}</textarea>
            </div>
            <div class="mt-16 flex gap-8">
                <button class="btn btn-primary" type="submit">Save Changes</button>
                <a class="btn btn-secondary" href="/dashboard">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
